<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✦ Do list · full-stack to-do</title>
  <!-- Font Awesome (pro) -->
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" crossorigin="anonymous" />
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
  <style>
    /* ----- reset & base – minimal CLS ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      transition: background 0.4s ease, color 0.3s ease;
      background: var(--bg-body, #0e1419);
      color: var(--text-primary, #eaf0ed);
    }

    /* ----- theme variables (10 themes) ----- */
    :root {
      --bg-body: #0e1419;
      --bg-app: rgba(22, 32, 38, 0.75);
      --border-app: rgba(120, 200, 150, 0.08);
      --text-primary: #eaf0ed;
      --text-secondary: #b5d5c5;
      --text-muted: #8aa89b;
      --card-bg: rgba(24, 40, 44, 0.6);
      --card-border: rgba(100, 180, 140, 0.06);
      --card-hover: rgba(36, 60, 60, 0.7);
      --input-bg: rgba(20, 34, 38, 0.7);
      --input-border: rgba(100, 180, 140, 0.2);
      --input-focus: #6db892;
      --btn-bg: linear-gradient(145deg, #3b7a5e, #255f45);
      --btn-hover: linear-gradient(145deg, #4c8f6e, #2b6e4e);
      --btn-shadow: 0 8px 20px -8px rgba(0, 60, 30, 0.4);
      --accent: #6db892;
      --accent-glow: rgba(100, 200, 150, 0.2);
      --check-accent: #5fa783;
      --delete-hover: #f5a0a0;
      --edit-hover: #b8e0c0;
      --stat-bg: rgba(0, 0, 0, 0.25);
      --empty-color: #6b8f7e;
      --scroll-track: #142025;
      --scroll-thumb: #3f735a;
      --selection-bg: #3f7a5a;
    }

    /* Theme 1: Ocean (default) */
    .theme-ocean {
      --bg-body: #0e1419;
      --bg-app: rgba(22, 32, 38, 0.75);
      --border-app: rgba(120, 200, 150, 0.08);
      --text-primary: #eaf0ed;
      --text-secondary: #b5d5c5;
      --text-muted: #8aa89b;
      --card-bg: rgba(24, 40, 44, 0.6);
      --card-border: rgba(100, 180, 140, 0.06);
      --card-hover: rgba(36, 60, 60, 0.7);
      --input-bg: rgba(20, 34, 38, 0.7);
      --input-border: rgba(100, 180, 140, 0.2);
      --input-focus: #6db892;
      --btn-bg: linear-gradient(145deg, #3b7a5e, #255f45);
      --btn-hover: linear-gradient(145deg, #4c8f6e, #2b6e4e);
      --accent: #6db892;
      --accent-glow: rgba(100, 200, 150, 0.2);
      --check-accent: #5fa783;
      --stat-bg: rgba(0, 0, 0, 0.25);
    }

    /* Theme 2: Sunset */
    .theme-sunset {
      --bg-body: #1a0f0a;
      --bg-app: rgba(48, 28, 20, 0.8);
      --border-app: rgba(220, 150, 100, 0.15);
      --text-primary: #f5ede6;
      --text-secondary: #e6cdb5;
      --text-muted: #b89a82;
      --card-bg: rgba(60, 38, 28, 0.6);
      --card-border: rgba(200, 140, 100, 0.1);
      --card-hover: rgba(80, 50, 38, 0.7);
      --input-bg: rgba(50, 30, 20, 0.7);
      --input-border: rgba(200, 140, 100, 0.25);
      --input-focus: #dba07a;
      --btn-bg: linear-gradient(145deg, #b87a4a, #8a5e3a);
      --btn-hover: linear-gradient(145deg, #c88a5a, #9a6e4a);
      --accent: #dba07a;
      --accent-glow: rgba(220, 150, 100, 0.25);
      --check-accent: #c88a5a;
      --stat-bg: rgba(0, 0, 0, 0.3);
    }

    /* Theme 3: Forest */
    .theme-forest {
      --bg-body: #0a120e;
      --bg-app: rgba(20, 40, 30, 0.8);
      --border-app: rgba(100, 180, 120, 0.12);
      --text-primary: #e8f0e5;
      --text-secondary: #b8d5c0;
      --text-muted: #7a9a82;
      --card-bg: rgba(28, 48, 36, 0.6);
      --card-border: rgba(80, 160, 100, 0.08);
      --card-hover: rgba(40, 68, 50, 0.7);
      --input-bg: rgba(20, 40, 28, 0.7);
      --input-border: rgba(80, 160, 100, 0.2);
      --input-focus: #7ab892;
      --btn-bg: linear-gradient(145deg, #3a7a5a, #2a5a42);
      --btn-hover: linear-gradient(145deg, #4a8a6a, #3a6a52);
      --accent: #7ab892;
      --accent-glow: rgba(100, 200, 130, 0.2);
      --check-accent: #6aaa7a;
      --stat-bg: rgba(0, 0, 0, 0.25);
    }

    /* Theme 4: Lavender */
    .theme-lavender {
      --bg-body: #120e1a;
      --bg-app: rgba(32, 24, 48, 0.8);
      --border-app: rgba(160, 130, 200, 0.12);
      --text-primary: #ede8f5;
      --text-secondary: #c8b8e0;
      --text-muted: #9a8ab0;
      --card-bg: rgba(44, 34, 60, 0.6);
      --card-border: rgba(150, 120, 190, 0.08);
      --card-hover: rgba(60, 46, 80, 0.7);
      --input-bg: rgba(38, 28, 54, 0.7);
      --input-border: rgba(150, 120, 190, 0.2);
      --input-focus: #b090d0;
      --btn-bg: linear-gradient(145deg, #7a5a9a, #5a3a7a);
      --btn-hover: linear-gradient(145deg, #8a6aaa, #6a4a8a);
      --accent: #b090d0;
      --accent-glow: rgba(160, 130, 200, 0.25);
      --check-accent: #9a7aba;
      --stat-bg: rgba(0, 0, 0, 0.3);
    }

    /* Theme 5: Cherry */
    .theme-cherry {
      --bg-body: #1a0a0e;
      --bg-app: rgba(48, 20, 28, 0.8);
      --border-app: rgba(200, 100, 120, 0.12);
      --text-primary: #f5e8ea;
      --text-secondary: #e0b8c0;
      --text-muted: #b08a92;
      --card-bg: rgba(60, 30, 40, 0.6);
      --card-border: rgba(190, 90, 110, 0.08);
      --card-hover: rgba(80, 42, 52, 0.7);
      --input-bg: rgba(50, 24, 32, 0.7);
      --input-border: rgba(190, 90, 110, 0.2);
      --input-focus: #d08090;
      --btn-bg: linear-gradient(145deg, #aa5a6a, #8a3a4a);
      --btn-hover: linear-gradient(145deg, #ba6a7a, #9a4a5a);
      --accent: #d08090;
      --accent-glow: rgba(200, 100, 120, 0.25);
      --check-accent: #ba6a7a;
      --stat-bg: rgba(0, 0, 0, 0.3);
    }

    /* Theme 6: Mint */
    .theme-mint {
      --bg-body: #080e0c;
      --bg-app: rgba(18, 40, 36, 0.8);
      --border-app: rgba(100, 200, 180, 0.1);
      --text-primary: #e8f5f0;
      --text-secondary: #b0d5cc;
      --text-muted: #7a9e94;
      --card-bg: rgba(26, 50, 44, 0.6);
      --card-border: rgba(80, 180, 160, 0.08);
      --card-hover: rgba(40, 70, 62, 0.7);
      --input-bg: rgba(20, 44, 38, 0.7);
      --input-border: rgba(80, 180, 160, 0.2);
      --input-focus: #70c0b0;
      --btn-bg: linear-gradient(145deg, #3a8a7a, #2a6a5a);
      --btn-hover: linear-gradient(145deg, #4a9a8a, #3a7a6a);
      --accent: #70c0b0;
      --accent-glow: rgba(100, 200, 180, 0.2);
      --check-accent: #5aaa9a;
      --stat-bg: rgba(0, 0, 0, 0.25);
    }

    /* Theme 7: Warm Gray */
    .theme-warmgray {
      --bg-body: #0f0d0b;
      --bg-app: rgba(40, 35, 30, 0.8);
      --border-app: rgba(160, 140, 120, 0.1);
      --text-primary: #f0ece6;
      --text-secondary: #d0c8bc;
      --text-muted: #a09888;
      --card-bg: rgba(52, 44, 38, 0.6);
      --card-border: rgba(140, 120, 100, 0.08);
      --card-hover: rgba(68, 58, 50, 0.7);
      --input-bg: rgba(44, 36, 30, 0.7);
      --input-border: rgba(140, 120, 100, 0.2);
      --input-focus: #c0b0a0;
      --btn-bg: linear-gradient(145deg, #8a7a6a, #6a5a4a);
      --btn-hover: linear-gradient(145deg, #9a8a7a, #7a6a5a);
      --accent: #c0b0a0;
      --accent-glow: rgba(160, 140, 120, 0.2);
      --check-accent: #a09080;
      --stat-bg: rgba(0, 0, 0, 0.25);
    }

    /* Theme 8: Sky */
    .theme-sky {
      --bg-body: #0a0e1a;
      --bg-app: rgba(20, 32, 52, 0.8);
      --border-app: rgba(100, 160, 220, 0.1);
      --text-primary: #e8eef5;
      --text-secondary: #b8cce0;
      --text-muted: #889ab0;
      --card-bg: rgba(30, 44, 64, 0.6);
      --card-border: rgba(80, 140, 200, 0.08);
      --card-hover: rgba(44, 60, 84, 0.7);
      --input-bg: rgba(24, 38, 58, 0.7);
      --input-border: rgba(80, 140, 200, 0.2);
      --input-focus: #80b0d8;
      --btn-bg: linear-gradient(145deg, #4a7aaa, #2a5a8a);
      --btn-hover: linear-gradient(145deg, #5a8aba, #3a6a9a);
      --accent: #80b0d8;
      --accent-glow: rgba(100, 160, 220, 0.2);
      --check-accent: #6a9aba;
      --stat-bg: rgba(0, 0, 0, 0.3);
    }

    /* Theme 9: Coral */
    .theme-coral {
      --bg-body: #1a0e0a;
      --bg-app: rgba(52, 28, 22, 0.8);
      --border-app: rgba(220, 120, 90, 0.12);
      --text-primary: #f5ece8;
      --text-secondary: #e0c8bc;
      --text-muted: #b09a8a;
      --card-bg: rgba(64, 38, 30, 0.6);
      --card-border: rgba(200, 110, 80, 0.08);
      --card-hover: rgba(84, 52, 42, 0.7);
      --input-bg: rgba(54, 32, 24, 0.7);
      --input-border: rgba(200, 110, 80, 0.2);
      --input-focus: #d89070;
      --btn-bg: linear-gradient(145deg, #b86a4a, #8a4a32);
      --btn-hover: linear-gradient(145deg, #c87a5a, #9a5a42);
      --accent: #d89070;
      --accent-glow: rgba(220, 120, 90, 0.25);
      --check-accent: #b86a4a;
      --stat-bg: rgba(0, 0, 0, 0.3);
    }

    /* Theme 10: Midnight */
    .theme-midnight {
      --bg-body: #080a12;
      --bg-app: rgba(16, 20, 36, 0.85);
      --border-app: rgba(80, 100, 180, 0.1);
      --text-primary: #e8eaf5;
      --text-secondary: #b8bce0;
      --text-muted: #888cb0;
      --card-bg: rgba(24, 30, 48, 0.6);
      --card-border: rgba(60, 80, 160, 0.08);
      --card-hover: rgba(36, 44, 68, 0.7);
      --input-bg: rgba(20, 24, 42, 0.7);
      --input-border: rgba(60, 80, 160, 0.2);
      --input-focus: #7080c0;
      --btn-bg: linear-gradient(145deg, #4a5a8a, #2a3a6a);
      --btn-hover: linear-gradient(145deg, #5a6a9a, #3a4a7a);
      --accent: #7080c0;
      --accent-glow: rgba(80, 100, 180, 0.2);
      --check-accent: #5a6aaa;
      --stat-bg: rgba(0, 0, 0, 0.35);
    }

    /* ----- apply theme variables to app ----- */
    .app-wrapper {
      max-width: 1200px;
      width: 100%;
      background: var(--bg-app);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 3.5rem 1.5rem 3.5rem 1.5rem;
      padding: 2.5rem 2.2rem 3rem;
      box-shadow: 0 30px 60px -20px rgba(0, 0, 0, 0.9), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-app);
      transition: background 0.4s ease, border-color 0.3s ease;
    }

    /* ----- header – asymmetric layout ----- */
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1.2rem 2rem;
      margin-bottom: 2.8rem;
      border-bottom: 1px solid var(--border-app);
      padding-bottom: 1.2rem;
    }

    .app-header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), var(--text-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .app-header h1 i {
      font-size: 2.2rem;
      color: var(--accent);
      opacity: 0.6;
      transition: 0.3s;
    }
    .app-header h1:hover i {
      transform: rotate(12deg) scale(1.1);
      opacity: 1;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .task-stats {
      display: flex;
      gap: 1.6rem;
      font-size: 0.95rem;
      background: var(--stat-bg);
      padding: 0.6rem 1.6rem;
      border-radius: 3rem;
      backdrop-filter: blur(4px);
      border: 1px solid var(--border-app);
    }

    .task-stats span {
      font-weight: 500;
      color: var(--text-secondary);
    }
    .task-stats i {
      margin-right: 6px;
      color: var(--accent);
    }

    /* ----- theme dropdown (10 themes) ----- */
    .theme-selector {
      position: relative;
    }

    .theme-selector select {
      background: var(--stat-bg);
      border: 1px solid var(--border-app);
      border-radius: 3rem;
      padding: 0.6rem 1.8rem 0.6rem 1.2rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      appearance: none;
      backdrop-filter: blur(4px);
      font-family: 'Inter', sans-serif;
      transition: 0.2s;
      min-width: 120px;
    }

    .theme-selector select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .theme-selector::after {
      content: '\f078';
      font-family: 'Font Awesome 5 Pro';
      font-weight: 900;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.7rem;
      pointer-events: none;
    }

    .theme-selector select option {
      background: var(--bg-app);
      color: var(--text-primary);
    }

    /* ----- add task – micro-interactive ----- */
    .add-task-area {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 2.8rem;
      flex-wrap: wrap;
    }

    .add-task-area input {
      flex: 1;
      min-width: 200px;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 4rem;
      padding: 1rem 1.8rem;
      font-size: 1rem;
      color: var(--text-primary);
      font-weight: 400;
      transition: all 0.25s;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .add-task-area input:focus {
      outline: none;
      border-color: var(--input-focus);
      box-shadow: 0 0 0 3px var(--accent-glow), inset 0 2px 8px rgba(0, 0, 0, 0.2);
      background: var(--card-hover);
    }

    .add-task-area input::placeholder {
      color: var(--text-muted);
      font-weight: 300;
    }

    .btn-primary {
      background: var(--btn-bg);
      border: none;
      border-radius: 4rem;
      padding: 0 2.2rem;
      font-weight: 600;
      color: #f0fcf5;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0, 0, 1);
      box-shadow: var(--btn-shadow);
      border: 1px solid rgba(255, 255, 255, 0.05);
      letter-spacing: 0.3px;
      white-space: nowrap;
      height: 3.6rem;
    }

    .btn-primary i {
      font-size: 1.1rem;
      transition: 0.25s;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.02);
      background: var(--btn-hover);
      box-shadow: 0 14px 28px -10px rgba(0, 0, 0, 0.5);
    }

    .btn-primary:active {
      transform: scale(0.94);
      transition-duration: 0.05s;
    }

    /* ----- task grid – asymmetric / staggered ----- */
    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.2rem;
      margin-top: 0.8rem;
    }

    .task-item {
      background: var(--card-bg);
      backdrop-filter: blur(4px);
      border: 1px solid var(--card-border);
      border-radius: 2rem 0.8rem 2rem 0.8rem;
      padding: 1.4rem 1.4rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 8px 16px -10px rgba(0, 0, 0, 0.6);
      position: relative;
      overflow: hidden;
      will-change: transform;
    }

    .task-item:nth-child(3n+1) {
      border-radius: 1rem 2.5rem 1rem 2.5rem;
    }
    .task-item:nth-child(5n+2) {
      border-radius: 3rem 0.8rem 1.5rem 0.8rem;
    }
    .task-item:nth-child(7n+4) {
      border-radius: 0.8rem 3rem 0.8rem 1.5rem;
    }

    .task-item:hover {
      transform: translateY(-6px) scale(1.01);
      background: var(--card-hover);
      border-color: var(--accent);
      box-shadow: 0 24px 40px -18px rgba(0, 0, 0, 0.6);
    }

    .task-item::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0;
      transition: 0.4s;
    }
    .task-item:hover::after {
      opacity: 1;
    }

    .task-content {
      display: flex;
      align-items: flex-start;
      gap: 0.8rem;
    }

    .task-check {
      margin-top: 0.2rem;
      width: 1.4rem;
      height: 1.4rem;
      accent-color: var(--check-accent);
      cursor: pointer;
      filter: drop-shadow(0 0 4px var(--accent-glow));
      transition: 0.2s;
      flex-shrink: 0;
    }
    .task-check:hover {
      transform: scale(1.15);
    }

    .task-text {
      font-size: 1rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text-primary);
      word-break: break-word;
      transition: 0.2s;
      flex: 1;
    }

    .task-text.completed {
      text-decoration: line-through;
      color: var(--text-muted);
      opacity: 0.7;
    }

    .task-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      margin-top: 0.2rem;
      opacity: 0.4;
      transition: 0.25s;
      border-top: 1px solid var(--border-app);
      padding-top: 0.7rem;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    .task-actions button {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-size: 0.95rem;
      padding: 0.2rem 0.6rem;
      border-radius: 2rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
      font-weight: 400;
    }

    .task-actions button i {
      font-size: 1rem;
    }

    .task-actions .edit-btn:hover {
      color: var(--edit-hover);
      background: var(--accent-glow);
      transform: scale(1.05);
    }
    .task-actions .delete-btn:hover {
      color: var(--delete-hover);
      background: rgba(200, 80, 80, 0.08);
      transform: scale(1.05);
    }

    .edit-input {
      background: var(--input-bg);
      border: 1px solid var(--accent);
      border-radius: 2rem;
      padding: 0.2rem 0.8rem;
      color: var(--text-primary);
      font-size: 1rem;
      width: 100%;
      outline: none;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3.5rem 1rem;
      color: var(--empty-color);
      font-weight: 300;
      letter-spacing: 0.5px;
      background: rgba(0, 0, 0, 0.1);
      border-radius: 4rem;
      backdrop-filter: blur(2px);
    }
    .empty-state i {
      font-size: 2.6rem;
      margin-bottom: 0.8rem;
      opacity: 0.3;
    }

    /* responsive */
    @media (max-width: 600px) {
      .app-wrapper {
        padding: 1.5rem;
        border-radius: 2rem 0.8rem 2rem 0.8rem;
      }
      .app-header h1 {
        font-size: 2rem;
      }
      .task-stats {
        font-size: 0.8rem;
        padding: 0.3rem 1rem;
      }
      .btn-primary {
        padding: 0 1.4rem;
        font-size: 0.9rem;
        height: 3.2rem;
      }
      .theme-selector select {
        padding: 0.4rem 1.6rem 0.4rem 1rem;
        font-size: 0.75rem;
        min-width: 100px;
      }
      .header-actions {
        gap: 0.8rem;
      }
    }

    /* scroll & selection */
    ::selection {
      background: var(--selection-bg);
      color: #f0faf3;
    }
    ::-webkit-scrollbar {
      width: 5px;
      background: var(--scroll-track);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--scroll-thumb);
      border-radius: 20px;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper" id="app">
    <!-- header -->
    <header class="app-header">
      <h1><i class="fas fa-check-circle"></i> Do list</h1>
      <div class="header-actions">
        <div class="task-stats">
          <span><i class="fas fa-tasks"></i> <span id="totalCount">0</span></span>
          <span><i class="fas fa-check"></i> <span id="doneCount">0</span></span>
        </div>
        <div class="theme-selector">
          <select id="themeSelect" aria-label="Change theme">
            <option value="ocean">🌊 Ocean</option>
            <option value="sunset">🌅 Sunset</option>
            <option value="forest">🌲 Forest</option>
            <option value="lavender">💜 Lavender</option>
            <option value="cherry">🍒 Cherry</option>
            <option value="mint">🌿 Mint</option>
            <option value="warmgray">🪨 Warm Gray</option>
            <option value="sky">☁️ Sky</option>
            <option value="coral">🐠 Coral</option>
            <option value="midnight">🌙 Midnight</option>
          </select>
        </div>
      </div>
    </header>

    <!-- add task -->
    <div class="add-task-area">
      <input type="text" id="taskInput" placeholder="Write a new task…" aria-label="New task" />
      <button class="btn-primary" id="addBtn"><i class="fas fa-plus-circle"></i> Add</button>
    </div>

    <!-- task grid -->
    <div class="task-grid" id="taskGrid">
      <div class="empty-state"><i class="fas fa-inbox"></i><br />No tasks yet. Add one above.</div>
    </div>
  </div>

  <script>
    (function() {
      "use strict";

      // ---------- state ----------
      let tasks = [];
      let editingId = null;

      // DOM refs
      const grid = document.getElementById('taskGrid');
      const input = document.getElementById('taskInput');
      const addBtn = document.getElementById('addBtn');
      const totalSpan = document.getElementById('totalCount');
      const doneSpan = document.getElementById('doneCount');
      const themeSelect = document.getElementById('themeSelect');

      // ---------- theme management ----------
      function applyTheme(themeName) {
        // remove all theme classes
        document.body.className = '';
        if (themeName && themeName !== 'ocean') {
          document.body.classList.add('theme-' + themeName);
        }
        localStorage.setItem('do_list_theme', themeName || 'ocean');
      }

      function loadTheme() {
        const saved = localStorage.getItem('do_list_theme') || 'ocean';
        themeSelect.value = saved;
        applyTheme(saved);
      }

      themeSelect.addEventListener('change', function() {
        applyTheme(this.value);
      });

      // ---------- persistence ----------
      function loadTasks() {
        try {
          const stored = localStorage.getItem('do_list_tasks');
          tasks = stored ? JSON.parse(stored) : [];
        } catch (_) { tasks = []; }
      }

      function saveTasks() {
        localStorage.setItem('do_list_tasks', JSON.stringify(tasks));
      }

      // ---------- render ----------
      function render() {
        const total = tasks.length;
        const done = tasks.filter(t => t.completed).length;
        totalSpan.textContent = total;
        doneSpan.textContent = done;

        if (total === 0) {
          grid.innerHTML =
            `<div class="empty-state"><i class="fas fa-inbox"></i><br />No tasks yet. Add one above.</div>`;
          return;
        }

        const fragment = document.createDocumentFragment();
        tasks.forEach((task) => {
          const card = document.createElement('div');
          card.className = 'task-item';
          card.dataset.id = task.id;

          const contentDiv = document.createElement('div');
          contentDiv.className = 'task-content';

          const check = document.createElement('input');
          check.type = 'checkbox';
          check.className = 'task-check';
          check.checked = task.completed;
          check.setAttribute('aria-label', 'Toggle task complete');
          check.addEventListener('change', (e) => {
            e.stopPropagation();
            toggleComplete(task.id, check.checked);
          });

          let textSpan = document.createElement('span');
          textSpan.className = 'task-text' + (task.completed ? ' completed' : '');
          textSpan.textContent = task.text;

          if (editingId === task.id) {
            const editInput = document.createElement('input');
            editInput.type = 'text';
            editInput.className = 'edit-input';
            editInput.value = task.text;
            editInput.setAttribute('aria-label', 'Edit task');
            setTimeout(() => editInput.focus(), 20);
            textSpan = editInput;
            editInput.addEventListener('blur', () => {
              const newText = editInput.value.trim();
              if (newText) {
                updateText(task.id, newText);
              } else {
                editingId = null;
                render();
              }
            });
            editInput.addEventListener('keydown', (e) => {
              if (e.key === 'Enter') editInput.blur();
              if (e.key === 'Escape') {
                editingId = null;
                render();
              }
            });
          }

          contentDiv.appendChild(check);
          contentDiv.appendChild(textSpan);

          const actions = document.createElement('div');
          actions.className = 'task-actions';

          const editBtn = document.createElement('button');
          editBtn.className = 'edit-btn';
          editBtn.innerHTML = '<i class="fas fa-pen"></i> Edit';
          editBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (editingId === task.id) {
              const inp = card.querySelector('.edit-input');
              if (inp) inp.blur();
              else { editingId = null;
                render(); }
            } else {
              editingId = task.id;
              render();
            }
          });

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i> Delete';
          deleteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteTask(task.id);
          });

          actions.appendChild(editBtn);
          actions.appendChild(deleteBtn);

          card.appendChild(contentDiv);
          card.appendChild(actions);
          fragment.appendChild(card);
        });

        grid.innerHTML = '';
        grid.appendChild(fragment);
      }

      // ---------- CRUD ----------
      function addTask(text) {
        const trimmed = text.trim();
        if (!trimmed) return false;
        tasks.push({
          id: Date.now() + '_' + Math.random().toString(36).slice(2, 6),
          text: trimmed,
          completed: false,
        });
        saveTasks();
        render();
        return true;
      }

      function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        if (editingId === id) editingId = null;
        saveTasks();
        render();
      }

      function toggleComplete(id, checked) {
        const task = tasks.find(t => t.id === id);
        if (task) {
          task.completed = checked;
          saveTasks();
          render();
        }
      }

      function updateText(id, newText) {
        const task = tasks.find(t => t.id === id);
        if (task && newText.trim()) {
          task.text = newText.trim();
          editingId = null;
          saveTasks();
          render();
        } else {
          editingId = null;
          render();
        }
      }

      // ---------- events ----------
      function handleAdd() {
        const val = input.value;
        if (addTask(val)) {
          input.value = '';
          input.focus();
        } else {
          input.style.borderColor = '#c97a7a';
          setTimeout(() => input.style.borderColor = '', 400);
        }
      }

      addBtn.addEventListener('click', handleAdd);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') handleAdd();
      });

      // ---------- init ----------
      loadTheme();
      loadTasks();
      render();

      // sample tasks if empty
      if (tasks.length === 0) {
        const samples = [
          'Design asymmetric layout',
          'Implement 10 themes',
          'Add micro-interactions',
          'Optimize CLS & performance'
        ];
        samples.forEach((txt, i) => {
          tasks.push({
            id: 'sample_' + i + '_' + Date.now(),
            text: txt,
            completed: i === 1 ? true : false,
          });
        });
        saveTasks();
        render();
      }

      // expose for debugging
      window.__tasks = tasks;
    })();
  </script>
</body>
</html>
